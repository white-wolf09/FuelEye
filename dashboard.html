
<link rel="stylesheet" href="css/style.css">

<h1>FuelEye Dashboard</h1>

<div class="analytics">
    ...
</div>

<section class="review-feed">

    <h2>Community Reviews</h2>

    <div id="reviewsFeed"></div>

</section>

<section class="proof-submission">

    <h2>Submit Fuel Verification Evidence</h2>

    <select id="pumpSelect">

        <option>PSO Johar Town</option>
        <option>Shell Thokar</option>
        <option>Total Parco</option>

    </select>

    <textarea
        id="reportText"
        placeholder="Describe your experience">
    </textarea>

    <input
        type="file"
        id="proofImage"
        accept="image/*">

    <button onclick="submitEvidence()">
        Submit Evidence
    </button>

</section>

<section class="myReports">

    <h2>My Submitted Reports</h2>

    <div id="userReports"></div>

</section>
